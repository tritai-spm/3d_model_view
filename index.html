<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer - Presentation</title>
    <!-- Import the component -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }
        .container {
            width: 95%;
            height: 90vh;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
        }
        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #ffffff;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 30px;
            display: flex;
            gap: 15px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(0,0,0,0.1);
        }
        .instruction {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="instruction">Dùng chuột để xoay, cuộn để phóng to</div>
        
        <!-- Thay link src bằng đường dẫn file .glb của bạn trên GitHub -->
        <model-viewer
            src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
            ios-src=""
            poster="https://modelviewer.dev/shared-assets/models/poster-astronaut.png"
            alt="A 3D model of an astronaut"
            shadow-intensity="1"
            camera-controls
            auto-rotate
            ar
        >
        </model-viewer>

        <div class="controls">
            <span><b>Tương tác:</b> Chuột trái (Xoay) | Chuột phải (Di chuyển) | Cuộn (Phóng to)</span>
        </div>
    </div>

</body>
</html>
